global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:8081']

  - job_name: data-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['data-service:8082']

  - job_name: agent-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['agent-service:8083']
