spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8085
          predicates:
            - Path=/api/auth/**
        - id: data-service
          uri: http://data-service:8082
          predicates:
            - Path=/api/data/**
        - id: agent-service
          uri: http://agent-service:8083
          predicates:
            - Path=/api/agent/**
        - id: config-service
          uri: http://config-service:8084
          predicates:
            - Path=/api/config/**
