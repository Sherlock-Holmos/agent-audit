server:
  port: 8081

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/auth/**
        - id: data-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/data/**
        - id: agent-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/agent/**
        - id: config-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/config/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  gateway:
    rate-limit-per-minute: ${GATEWAY_RATE_LIMIT_PER_MINUTE:120}
    ip-rate-limit-per-minute: ${GATEWAY_IP_RATE_LIMIT_PER_MINUTE:240}

auth:
  jwt:
    secret: audit-secret-key-audit-secret-key-2026
