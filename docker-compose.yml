services:
  nginx:
    image: nginx:1.27-alpine
    container_name: audit-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    build: ./services/gateway
    container_name: audit-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - auth-service
      - data-service
      - agent-service
      - config-service
      - redis
    ports:
      - "8081:8081"
    restart: unless-stopped

  auth-service:
    build: ./services/auth-service
    container_name: audit-auth-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/agent_audit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - mysql
    ports:
      - "8085:8085"
    restart: unless-stopped

  data-service:
    build: ./services/data-service
    container_name: audit-data-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/agent_audit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      APP_DATASOURCE_UPLOAD_DIR: /app/uploads
    depends_on:
      - mysql
      - redis
    ports:
      - "8082:8082"
    volumes:
      - ./data/uploads:/app/uploads
    restart: unless-stopped

  agent-service:
    build: ./services/agent-service
    container_name: audit-agent-service
    environment:
      # data-service 地址
      DATA_BASE_URL: http://data-service:8082
      # Redis 连接
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # LLM 提供商：mock | openai | azure
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-08-01-preview}
      # RAG 向量数据库（预留）
      VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-none}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
    depends_on:
      - data-service
      - redis
    ports:
      - "8083:8083"
    restart: unless-stopped

  config-service:
    build: ./services/config-service
    container_name: audit-config-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8084:8084"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: audit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: agent_audit
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: audit-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: audit-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - gateway
      - data-service
      - agent-service
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: audit-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mysql-data:
